openapi: 3.1.0
info:
  title: MercadoPago API
  description: The MercadoPago REST API. Please see https://www.mercadopago.com/developers for more details.
  termsOfService: https://www.mercadopago.com/developers/es/docs/resources/legal/terms-and-conditions
  contact:
    name: MercadoPago Developer Experience
    url: https://www.mercadopago.com/developers
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.mercadopago.com
  description: Production
security:
- bearerAuth: []
tags:
- name: OAuth
  description: Authorization flows for marketplace on-behalf-of and Wallet Connect
  x-mp-sites: &id001
  - MLA
  - MLB
  - MLM
  - MLC
  - MCO
  - MPE
  - MLU
- name: Preferences
  description: Checkout Pro — redirect-based hosted checkout via Preferences
  x-mp-sites: *id001
- name: Payments
  description: Create and manage payment transactions
  x-mp-sites: *id001
- name: Orders
  description: Checkout API via Orders — recommended for new custom checkout integrations
  x-mp-sites: *id001
- name: Merchant Orders
  description: Order containers that group payments for a single purchase
  x-mp-sites: *id001
- name: Customers
  description: Customer profiles and stored payment methods
  x-mp-sites: *id001
- name: Cards
  description: Saved cards and card tokenization
  x-mp-sites: *id001
- name: Addresses
  description: Customer shipping and billing addresses
  x-mp-sites: *id001
- name: Payment Methods
  description: Available payment methods and installment plans per country
  x-mp-sites: *id001
- name: Identification Types
  description: Country-specific identity document type catalog
  x-mp-sites: *id001
- name: Cancellations & Refunds
  description: Cancel payments and create full or partial refunds
  x-mp-sites: *id001
- name: Chargebacks
  description: Chargeback dispute management
  x-mp-sites: *id001
- name: Subscriptions
  description: Recurring payment subscriptions
  x-mp-sites: *id001
- name: Plans
  description: Subscription billing plans
  x-mp-sites: *id001
- name: Invoices
  description: Subscription billing invoices
  x-mp-sites: *id001
- name: Wallet Connect
  description: OAuth-based wallet agreement flows for Wallet Connect
  x-mp-sites:
  - MLA
  - MLB
  - MLM
- name: Stores
  description: Physical store locations
  x-mp-sites: *id001
- name: POS
  description: Point of sale device management
  x-mp-sites: *id001
- name: Terminals
  description: Point hardware terminal management and print actions
  x-mp-sites:
  - MLA
  - MLB
  - MLC
  - MLM
- name: Point Deprecated
  description: Deprecated Point integration APIs — use Terminals and Point Orders instead
  x-mp-sites:
  - MLA
  - MLB
  - MLM
- name: QR Orders
  description: In-store payment orders associated with QR codes
  x-mp-sites:
  - MLA
  - MLB
  - MLC
  - MCO
  - MPE
  - MLU
- name: QR Integrator
  description: Integrator configuration for QR in-store
  x-mp-sites: *id001
- name: QR Deprecated
  description: Deprecated in-store QR order endpoints (V1, V2, Dynamic QR)
  x-mp-sites: *id001
- name: Claims
  description: Post-sale claim details and search
  x-mp-sites: *id001
- name: Claim Messages
  description: Messages and file attachments within a claim
  x-mp-sites: *id001
- name: Claim Resolutions
  description: Mediation requests and expected resolutions
  x-mp-sites: *id001
- name: Claim Shipping
  description: Upload shipping evidence to support a claim
  x-mp-sites: *id001
- name: Releases Report
  description: Generate and schedule releases (settlement) reports
  x-mp-sites: *id001
- name: Settlements Report
  description: Generate and schedule all-transactions reports
  x-mp-sites: *id001
- name: Payouts
  description: Bank transfer and Pix payouts
  x-mp-sites:
  - MLA
  - MLB
  - MLM
  - MLC
paths:
  /pos:
    get:
      operationId: searchPOS
      summary: Search points of sale
      tags:
      - POS
      security:
      - bearerAuth: []
      parameters:
      - name: external_id
        in: query
        schema:
          type: string
      - name: external_store_id
        in: query
        schema:
          type: string
      - name: store_id
        in: query
        schema:
          type: string
      - name: category
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: POS search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  paging:
                    $ref: '#/components/schemas/Pagination'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/POS'
  /pos/{id}:
    put:
      operationId: updatePOS
      summary: Update a point of sale
      tags:
      - POS
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/POSRequest'
      responses:
        '200':
          description: POS updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/POS'
        '404':
          $ref: '#/components/responses/NotFound'
  /post-purchase/v1/claims/{claim_id}:
    get:
      operationId: getClaim
      summary: Get claim details
      description: Returns full details of a post-sale claim including status, stage, and players.
      tags:
      - Claims
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Claim found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Claim'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /post-purchase/v1/claims/search:
    get:
      operationId: searchClaims
      summary: Search claims
      tags:
      - Claims
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: query
        schema:
          type: integer
      - name: type
        in: query
        schema:
          type: string
          enum:
          - mediations
          - claims
      - name: stage
        in: query
        schema:
          type: string
          enum:
          - claim
          - dispute
          - resolution
      - name: status
        in: query
        schema:
          type: string
          enum:
          - opened
          - closed
          - cancelled
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Claims search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimSearchResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /post-purchase/v1/claims/reasons/{reason_id}:
    get:
      operationId: getClaimReasons
      summary: Get claim reason
      description: Returns the description and metadata for a specific claim reason code.
      tags:
      - Claims
      security:
      - bearerAuth: []
      parameters:
      - name: reason_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Reason found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimReason'
        '404':
          $ref: '#/components/responses/NotFound'
  /post-purchase/v1/claims/{claim_id}/status_history:
    get:
      operationId: getClaimHistory
      summary: Get claim status history
      tags:
      - Claims
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: History entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClaimHistoryEntry'
  /post-purchase/v1/claims/{claim_id}/evidences:
    get:
      operationId: getClaimEvidence
      summary: Get claim evidence
      tags:
      - Claims
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Evidence list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClaimEvidence'
  /post-purchase/v1/claims/{claim_id}/messages:
    get:
      operationId: getClaimMessages
      summary: Get claim messages
      tags:
      - Claim Messages
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Message thread
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClaimMessage'
  /post-purchase/v1/claims/{claim_id}/actions/send-message:
    post:
      operationId: sendClaimMessage
      summary: Send a message in a claim
      description: Sends a text message (with optional attachments) in the claim thread.
      tags:
      - Claim Messages
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      - name: application_id
        in: query
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Message sent
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /post-purchase/v1/claims/{claim_id}/attachments:
    post:
      operationId: attachClaimFile
      summary: Attach a file to a claim message
      description: 'Uploads and attaches a file (image, PDF) to a claim. Supported formats: JPEG, PNG, PDF. Max size: 10 MB.'
      tags:
      - Claim Messages
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                  description: File to attach (JPEG, PNG, or PDF, max 10 MB)
      responses:
        '201':
          description: File attached
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_id:
                    type: string
                  file_name:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /post-purchase/v1/claims/{claim_id}/attachments/{fileName}:
    get:
      operationId: getClaimFile
      summary: Get attached file metadata
      tags:
      - Claim Messages
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      - name: fileName
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_name:
                    type: string
                  file_id:
                    type: string
                  content_type:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
  /post-purchase/v1/claims/{claim_id}/attachments/{fileName}/download:
    get:
      operationId: downloadClaimFile
      summary: Download an attached file
      tags:
      - Claim Messages
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      - name: fileName
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
  /post-purchase/v1/claims/{claim_id}/actions/open-dispute:
    post:
      operationId: requestClaimMediation
      summary: Request claim mediation
      description: Escalates a claim to mediation, requesting MP to intervene in the dispute.
      tags:
      - Claim Resolutions
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Mediation requested
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /post-purchase/v1/claims/{claim_id}/expected-resolutions:
    get:
      operationId: getClaimMediationResolutions
      summary: Get expected mediation resolutions
      description: Returns the possible resolution options for a claim at the mediation stage.
      tags:
      - Claim Resolutions
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Expected resolutions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MediationResolution'
  /post-purchase/v1/claims/{claim_id}/actions/evidences:
    post:
      operationId: uploadShippingEvidence
      summary: Upload shipping evidence
      description: Uploads shipping evidence (tracking code, proof of delivery) to support the seller's case in a claim. Accepted
        as part of the claims resolution process.
      tags:
      - Claim Shipping
      security:
      - bearerAuth: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                  - tracking_code
                  - proof_of_delivery
                value:
                  type: string
                  description: Tracking code or delivery confirmation reference
      responses:
        '201':
          description: Shipping evidence uploaded
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For client_credentials
        and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  schemas:
    Claim:
      type: object
      description: A post-sale claim (dispute) between buyer and seller
      properties:
        id:
          type: integer
          description: Claim unique identifier
          example: 4567890123
        type:
          type: string
          enum:
          - mediations
          - claims
          description: mediations — buyer-initiated dispute requiring MP mediation; claims — seller-initiated claim
        stage:
          type: string
          enum:
          - claim
          - dispute
          - resolution
          description: Current stage in the dispute lifecycle
        status:
          type: string
          enum:
          - opened
          - closed
          - cancelled
        date_created:
          type: string
          format: date-time
        last_updated:
          type: string
          format: date-time
        resource:
          type: string
          enum:
          - payment
          - shipment
          - order
          description: Resource type the claim is about
        reason_id:
          type: string
          description: Reason code for the claim
        players:
          type: array
          description: Parties involved (buyer, seller)
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                - complainant
                - respondent
              user_id:
                type: integer
              available_actions:
                type: array
                items:
                  type: string
    ClaimMessage:
      type: object
      description: A message within a claim thread
      properties:
        id:
          type: integer
        date_created:
          type: string
          format: date-time
        from:
          type: object
          properties:
            user_id:
              type: integer
            role:
              type: string
              enum:
              - complainant
              - respondent
              - mediator
        message:
          type: string
          description: Text content of the message
        attachments:
          type: array
          items:
            type: object
            properties:
              file_name:
                type: string
              file_id:
                type: string
    ClaimReason:
      type: object
      description: A reason code for opening a claim
      properties:
        id:
          type: string
          example: PNR
        description:
          type: string
          example: Product not received
        type:
          type: string
          enum:
          - mediations
          - claims
    ClaimSearchResult:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Pagination'
        results:
          type: array
          items:
            $ref: '#/components/schemas/Claim'
    ClaimHistoryEntry:
      type: object
      properties:
        date:
          type: string
          format: date-time
        status:
          type: string
        stage:
          type: string
        changed_by:
          type: string
          enum:
          - buyer
          - seller
          - system
          - mediator
    ClaimEvidence:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
          - tracking_code
          - photo
          - invoice
          - other
        date_created:
          type: string
          format: date-time
        file_name:
          type: string
    MediationResolution:
      type: object
      description: Expected resolution options at mediation stage
      properties:
        type:
          type: string
          enum:
          - refund
          - return
          - partial_refund
        amount:
          type: number
          format: float
        reason:
          type: string
    SendMessageRequest:
      type: object
      required:
      - message
      properties:
        message:
          type: string
          description: Text content of the message to send
          example: I can provide the tracking code for the shipment.
        attachments:
          type: array
          description: File IDs to attach (upload first via attachments endpoint)
          items:
            type: string
    POSRequest:
      type: object
      required:
      - name
      - store_id
      properties:
        name:
          type: string
          description: POS display name
          example: Caixa 1
        store_id:
          type: string
          description: Parent store ID
        external_id:
          type: string
          description: Your internal POS identifier
        external_store_id:
          type: string
        category:
          type: integer
          description: Business category code
        fixed_amount:
          type: boolean
          description: When true the POS amount is fixed and cannot be changed by payer
          default: false
        url:
          type: string
          format: uri
          description: Webhook URL for this specific POS
    POS:
      allOf:
      - $ref: '#/components/schemas/POSRequest'
      - type: object
        properties:
          id:
            type: string
          qr_code:
            type: string
            description: QR code data string for this POS
          qr_code_image:
            type: string
            format: uri
            description: URL of QR code image
          date_created:
            type: string
            format: date-time
          date_last_updated:
            type: string
            format: date-time
    Pagination:
      type: object
      description: Pagination metadata returned in list/search responses
      properties:
        total:
          type: integer
          description: Total number of results
          example: 42
        limit:
          type: integer
          description: Results per page
          example: 30
        offset:
          type: integer
          description: Offset of the current page
          example: 0
