paths:
  /v1/payment_methods:
    get:
      operationId: listPaymentMethods
      summary: List available payment methods
      description: Returns all payment methods available for the credential's site_id. Use this to build payment method selectors
        and validate method availability before attempting a payment.
      tags:
      - Payment Methods
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Payment methods list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    payment_type_id:
                      type: string
                    status:
                      type: string
                      enum:
                      - active
                      - deactivated
                    secure_thumbnail:
                      type: string
                      format: uri
                    thumbnail:
                      type: string
                      format: uri
                    deferred_capture:
                      type: string
                      enum:
                      - supported
                      - unsupported
                      - does_not_apply
                    settings:
                      type: object
                      description: Card settings (bin ranges, security codes, card length).
                    additional_info_needed:
                      type: array
                      items:
                        type: string
                      description: Additional fields required at checkout.
                    min_allowed_amount:
                      type: number
                      format: float
                    max_allowed_amount:
                      type: number
                      format: float
                    accreditation_time:
                      type: integer
                    financial_institutions:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                          description:
                            type: string
                    processing_modes:
                      type: array
                      items:
                        type: string
                        enum:
                        - aggregator
                        - gateway
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/payment_methods/installments:
    get:
      operationId: getInstallments
      summary: Get installment options
      description: Returns available installment plans for a given card BIN, amount, and site. Use this to populate installment
        selectors in your checkout.
      tags:
      - Payment Methods
      security:
      - bearerAuth: []
      parameters:
      - name: payment_method_id
        in: query
        required: true
        schema:
          type: string
        example: visa
      - name: amount
        in: query
        required: true
        schema:
          type: number
          format: float
        example: 1000.0
      - name: issuer_id
        in: query
        schema:
          type: string
      - name: bin
        in: query
        schema:
          type: string
        description: First 6 digits of the card (BIN) for more accurate installment pricing
        example: '411111'
      responses:
        '200':
          description: Installment options
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    payment_method_id:
                      type: string
                    payment_type_id:
                      type: string
                    issuer:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                    payer_costs:
                      type: array
                      items:
                        type: object
                        properties:
                          installments:
                            type: integer
                          installment_rate:
                            type: number
                            format: float
                          discount_rate:
                            type: number
                            format: float
                          reimbursement_rate:
                            type: number
                            format: float
                          labels:
                            type: array
                            items:
                              type: string
                          total_amount:
                            type: number
                            format: float
                          installment_amount:
                            type: number
                            format: float
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For client_credentials
        and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  schemas: {}
