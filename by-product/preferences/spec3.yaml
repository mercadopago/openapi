openapi: 3.1.0
info:
  title: MercadoPago API
  description: The MercadoPago REST API. Please see https://www.mercadopago.com/developers for more details.
  termsOfService: https://www.mercadopago.com/developers/es/docs/resources/legal/terms-and-conditions
  contact:
    name: MercadoPago Developer Experience
    url: https://www.mercadopago.com/developers
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: 1.0.0
servers:
- url: https://api.mercadopago.com
  description: Production
security:
- bearerAuth: []
tags:
- name: OAuth
  description: Authorization flows for marketplace on-behalf-of and Wallet Connect
  x-mp-sites: &id001
  - MLA
  - MLB
  - MLM
  - MLC
  - MCO
  - MPE
  - MLU
- name: Preferences
  description: Checkout Pro — redirect-based hosted checkout via Preferences
  x-mp-sites: *id001
- name: Payments
  description: Create and manage payment transactions
  x-mp-sites: *id001
- name: Orders
  description: Checkout API via Orders — recommended for new custom checkout integrations
  x-mp-sites: *id001
- name: Merchant Orders
  description: Order containers that group payments for a single purchase
  x-mp-sites: *id001
- name: Customers
  description: Customer profiles and stored payment methods
  x-mp-sites: *id001
- name: Cards
  description: Saved cards and card tokenization
  x-mp-sites: *id001
- name: Addresses
  description: Customer shipping and billing addresses
  x-mp-sites: *id001
- name: Payment Methods
  description: Available payment methods and installment plans per country
  x-mp-sites: *id001
- name: Identification Types
  description: Country-specific identity document type catalog
  x-mp-sites: *id001
- name: Cancellations & Refunds
  description: Cancel payments and create full or partial refunds
  x-mp-sites: *id001
- name: Chargebacks
  description: Chargeback dispute management
  x-mp-sites: *id001
- name: Subscriptions
  description: Recurring payment subscriptions
  x-mp-sites: *id001
- name: Plans
  description: Subscription billing plans
  x-mp-sites: *id001
- name: Invoices
  description: Subscription billing invoices
  x-mp-sites: *id001
- name: Wallet Connect
  description: OAuth-based wallet agreement flows for Wallet Connect
  x-mp-sites:
  - MLA
  - MLB
  - MLM
- name: Stores
  description: Physical store locations
  x-mp-sites: *id001
- name: POS
  description: Point of sale device management
  x-mp-sites: *id001
- name: Terminals
  description: Point hardware terminal management and print actions
  x-mp-sites:
  - MLA
  - MLB
  - MLC
  - MLM
- name: Point Deprecated
  description: Deprecated Point integration APIs — use Terminals and Point Orders instead
  x-mp-sites:
  - MLA
  - MLB
  - MLM
- name: QR Orders
  description: In-store payment orders associated with QR codes
  x-mp-sites:
  - MLA
  - MLB
  - MLC
  - MCO
  - MPE
  - MLU
- name: QR Integrator
  description: Integrator configuration for QR in-store
  x-mp-sites: *id001
- name: QR Deprecated
  description: Deprecated in-store QR order endpoints (V1, V2, Dynamic QR)
  x-mp-sites: *id001
- name: Claims
  description: Post-sale claim details and search
  x-mp-sites: *id001
- name: Claim Messages
  description: Messages and file attachments within a claim
  x-mp-sites: *id001
- name: Claim Resolutions
  description: Mediation requests and expected resolutions
  x-mp-sites: *id001
- name: Claim Shipping
  description: Upload shipping evidence to support a claim
  x-mp-sites: *id001
- name: Releases Report
  description: Generate and schedule releases (settlement) reports
  x-mp-sites: *id001
- name: Settlements Report
  description: Generate and schedule all-transactions reports
  x-mp-sites: *id001
- name: Payouts
  description: Bank transfer and Pix payouts
  x-mp-sites:
  - MLA
  - MLB
  - MLM
  - MLC
paths:
  /checkout/preferences:
    post:
      operationId: createPreference
      summary: Create a preference
      description: "Creates a Checkout Pro preference. The response contains `init_point` (production) and \n**Webhook events\
        \ triggered:** payment, merchant_order"
      tags:
      - Preferences
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceRequest'
            examples:
              simple:
                summary: Simple one-item preference
                value:
                  items:
                  - title: Premium Plan
                    quantity: 1
                    unit_price: 99.9
                  payer:
                    email: customer@example.com
                  back_urls:
                    success: https://mystore.com/success
                    failure: https://mystore.com/failure
                    pending: https://mystore.com/pending
                  auto_return: approved
      responses:
        '201':
          description: Preference created
          content: &id002
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '200':
          description: Preference created
          content: *id002
  /checkout/preferences/{id}:
    get:
      operationId: getPreference
      summary: Get preference by ID
      tags:
      - Preferences
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Preference found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      operationId: updatePreference
      summary: Update a preference
      tags:
      - Preferences
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceRequest'
      responses:
        '200':
          description: Preference updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
        '400':
          $ref: '#/components/responses/BadRequest'
  /checkout/preferences/search:
    get:
      operationId: searchPreferences
      summary: Search preferences
      tags:
      - Preferences
      security:
      - bearerAuth: []
      parameters:
      - name: external_reference
        in: query
        schema:
          type: string
      - name: marketplace
        in: query
        schema:
          type: string
      - name: site_id
        in: query
        schema:
          type: string
      - name: sponsor_id
        in: query
        schema:
          type: integer
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  elements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Preference'
                  paging:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For client_credentials
        and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  schemas:
    PreferenceRequest:
      type: object
      required:
      - items
      description: Request body to create a Checkout Pro preference. The preference generates a hosted checkout URL (init_point)
        where the payer is redirected to complete payment on MP's UI. Use this for simple integrations; use Orders API for
        custom checkout experiences.
      properties:
        items:
          type: array
          description: List of products/services being purchased
          items:
            $ref: '#/components/schemas/PreferenceItem'
          minItems: 1
        payer:
          $ref: '#/components/schemas/PreferencePayer'
        payment_methods:
          $ref: '#/components/schemas/PreferencePaymentMethods'
        shipments:
          $ref: '#/components/schemas/PreferenceShipments'
        back_urls:
          $ref: '#/components/schemas/PreferenceBackUrls'
        notification_url:
          type: string
          format: uri
          description: URL for IPN notifications. DEPRECATED — use Webhooks instead.
          deprecated: true
        statement_descriptor:
          type: string
          description: Text on the payer's card statement. Max 22 chars.
          maxLength: 22
        additional_info:
          type: string
          description: Free-text additional info (returned in webhook notifications)
        auto_return:
          type: string
          enum:
          - approved
          - all
          description: approved — auto-redirect to success URL on approved payments; all — auto-redirect for any final status.
        external_reference:
          type: string
          description: Your internal order reference. Returned in webhook payloads.
          example: ORDER-2024-001234
        expires:
          type: boolean
          description: Whether this preference has an expiry window
          default: false
        expiration_date_from:
          type: string
          format: date-time
          description: Preference activation start time (ISO 8601)
        expiration_date_to:
          type: string
          format: date-time
          description: Preference expiration time (ISO 8601)
        marketplace:
          type: string
          description: Marketplace identifier
        marketplace_fee:
          type: number
          format: float
          description: Marketplace fee charged to the seller
        differential_pricing:
          type: object
          properties:
            id:
              type: integer
        binary_mode:
          type: boolean
          default: false
    PreferenceItem:
      type: object
      required:
      - title
      - quantity
      - unit_price
      properties:
        id:
          type: string
        title:
          type: string
          example: Premium Plan
        description:
          type: string
        picture_url:
          type: string
          format: uri
        category_id:
          type: string
        quantity:
          type: integer
          minimum: 1
          example: 1
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
        unit_price:
          type: number
          format: float
          description: Unit price as a decimal (not integer cents)
          example: 99.9
    PreferencePayer:
      type: object
      properties:
        name:
          type: string
        surname:
          type: string
        email:
          type: string
          format: email
        phone:
          $ref: '#/components/schemas/Phone'
        identification:
          $ref: '#/components/schemas/Identification'
        address:
          $ref: '#/components/schemas/Address'
        date_created:
          type: string
          format: date-time
    PreferencePaymentMethods:
      type: object
      properties:
        excluded_payment_methods:
          type: array
          description: Payment methods to hide from checkout UI
          items:
            type: object
            properties:
              id:
                type: string
        excluded_payment_types:
          type: array
          description: Payment type groups to exclude
          items:
            type: object
            properties:
              id:
                type: string
        installments:
          type: integer
          description: Maximum number of installments to offer
          example: 12
        default_installments:
          type: integer
          description: Pre-selected installments in the UI
    PreferenceShipments:
      type: object
      properties:
        mode:
          type: string
          enum:
          - custom
          - me2
          - not_specified
        free_shipping:
          type: boolean
          default: false
        receiver_address:
          $ref: '#/components/schemas/Address'
        cost:
          type: number
          format: float
    PreferenceBackUrls:
      type: object
      description: Redirect URLs after checkout completion. Configure auto_return to control when automatic redirects happen.
      properties:
        success:
          type: string
          format: uri
          description: Redirect after approved payment
        pending:
          type: string
          format: uri
          description: Redirect for pending payments (e.g., Boleto)
        failure:
          type: string
          format: uri
          description: Redirect after rejected payment
    Preference:
      type: object
      description: A created Checkout Pro preference
      properties:
        id:
          type: string
          description: Preference unique identifier
          example: 123456789-abcd1234-ef56-7890-abcd-ef1234567890
        init_point:
          type: string
          format: uri
          description: Production checkout URL. Redirect your payer here to complete payment.
          example: https://www.mercadopago.com.br/checkout/v1/redirect?pref_id=...
        items:
          type: array
          items:
            $ref: '#/components/schemas/PreferenceItem'
        payer:
          $ref: '#/components/schemas/PreferencePayer'
        payment_methods:
          $ref: '#/components/schemas/PreferencePaymentMethods'
        back_urls:
          $ref: '#/components/schemas/PreferenceBackUrls'
        external_reference:
          type: string
        date_created:
          type: string
          format: date-time
        last_updated:
          type: string
          format: date-time
        total_amount:
          type: number
          format: float
        expires:
          type: boolean
        expiration_date_from:
          type: string
          format: date-time
        expiration_date_to:
          type: string
          format: date-time
        collector_id:
          type: integer
        client_id:
          type: string
        marketplace:
          type: string
        marketplace_fee:
          type: number
          format: float
    CurrencyId:
      type: string
      description: ISO 4217 currency code for the applicable site
      enum:
      - ARS
      - BRL
      - MXN
      - CLP
      - COP
      - PEN
      - UYU
      - BOB
      - PYG
      - USD
      - CRC
      - DOP
      - HNL
      - NIO
      - GTQ
      - VES
      example: BRL
    Identification:
      type: object
      description: Payer identification document. Valid types vary by country.
      properties:
        type:
          type: string
          description: Identification type (e.g., CPF, CNPJ for Brazil; DNI for Argentina; RFC for Mexico)
          example: CPF
        number:
          type: string
          description: Identification number (no formatting — digits only)
          example: '12345678909'
    Phone:
      type: object
      properties:
        area_code:
          type: string
          example: '11'
        number:
          type: string
          example: '987654321'
    Address:
      type: object
      properties:
        zip_code:
          type: string
          example: 01310-100
        street_name:
          type: string
          example: Av. Paulista
        street_number:
          type: string
          example: '1000'
        city:
          type: string
        state:
          type: string
        country:
          type: string
    Pagination:
      type: object
      description: Pagination metadata returned in list/search responses
      properties:
        total:
          type: integer
          description: Total number of results
          example: 42
        limit:
          type: integer
          description: Results per page
          example: 30
        offset:
          type: integer
          description: Offset of the current page
          example: 0
