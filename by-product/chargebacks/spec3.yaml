paths:
  /v1/chargebacks/{id}:
    get:
      operationId: getChargeback
      summary: Get chargeback by ID
      tags:
      - Chargebacks
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Chargeback found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  payments:
                    type: array
                    items:
                      type: object
                  currency:
                    type: string
                  amount:
                    type: number
                    format: float
                  coverage_applied:
                    type: boolean
                  coverage_elegible:
                    type: boolean
                  documentation_required:
                    type: boolean
                  documentation_status:
                    type: string
                    enum:
                    - valid
                    - invalid
                    - not_supplied
                  documentation:
                    type: object
                  date_documentation_deadline:
                    type: string
                    format: date-time
                  date_created:
                    type: string
                    format: date-time
                  date_last_updated:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateChargeback
      summary: Upload chargeback documentation
      tags:
      - Chargebacks
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                      url:
                        type: string
                        format: uri
      responses:
        '200':
          description: Chargeback updated
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: Public key for client-side card tokenization via MercadoPago.js only. Never use for server-side calls.
    mercadopagoOAuth:
      type: oauth2
      description: OAuth 2.0 authorization_code flow for marketplace on-behalf-of and Wallet Connect integrations. For client_credentials
        and refresh_token, use POST /oauth/token directly with the appropriate grant_type.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  schemas: {}
