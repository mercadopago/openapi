          type: string
          example: 2c9380847e9c5058017ea64ea8260b60
        payer_id:
          type: integer
        payer_email:
          type: string
          format: email
        preapproval_plan_id:
          type: string
        reason:
          type: string
        external_reference:
          type: string
        status:
          type: string
          enum:
          - pending
          - authorized
          - paused
          - cancelled
        date_created:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        auto_recurring:
          $ref: '#/components/schemas/AutoRecurring'
        summarized:
          type: object
