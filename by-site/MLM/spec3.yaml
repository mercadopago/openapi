              - config
              - content
              properties:
                type:
                  type: string
                  enum:
                  - PRINT_INFO
                  - PRINT_DTE
                  description: PRINT_INFO — print a custom image or receipt; PRINT_DTE — print a DTE document (MLC only)
                external_reference:
                  type: string
                  description: Your reference ID for this print job
                config:
                  type: object
                  description: Target terminal configuration
                  properties:
                    device_id:
                      type: string
                      description: Terminal device ID
                content:
                  type: object
                  description: Print content (varies by type)
                  properties:
                    source:
                      type: string
                      format: uri
                      description: URL of image to print (PRINT_INFO)
                    dte_data:
                      type: string
                      description: Base64-encoded DTE XML (PRINT_DTE, MLC only)
