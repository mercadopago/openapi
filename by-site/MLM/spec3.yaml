      description: 'Sends a print action to a Point terminal — either a receipt image or a DTE (electronic tax document, available
        in Chile/MLC only). Set `type` to `PRINT_INFO` for image printing or `PRINT_DTE` for DTE.

        **Available in:** Argentina, Brazil, Chile, Mexico (MLA, MLB, MLC, MLM)'
      tags:
