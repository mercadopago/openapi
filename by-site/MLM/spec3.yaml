        preapproval_id:
          type: string
        status:
          type: string
          enum:
          - scheduled
          - processed
          - recycling
          - cancelled
        status_detail:
          type: string
        date_created:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        transaction_amount:
          type: number
          format: float
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
        payment:
          type: object
          properties:
            id:
              type: integer
              description: Linked payment ID in /v1/payments
            status:
              type: string
            status_detail:
              type: string
    SubscriptionSearchResult:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Pagination'
        results:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
    OrderRequest:
      type: object
      required:
      - type
      - total_amount
      - transactions
      - payer
      description: 'Request body to create an Order. Supports automatic (single-stage) and manual (multi-stage) processing
        modes. Use processing_mode=automatic for most integrations.

        '
      properties:
        type:
          type: string
          enum:
          - online
          description: Order type. Only "online" is supported for online payments.
          example: online
        processing_mode:
          type: string
          enum:
          - automatic
          - manual
          description: 'automatic — MP processes all transactions immediately in a single stage. manual — transactions are
            processed in configurable stages; use the /process endpoint to trigger processing after creation.

            '
          example: automatic
        capture_mode:
          type: string
          enum:
          - automatic
          - manual
          - automatic_async
          description: 'automatic — authorize and capture funds at the same time. manual — authorize only (reserve funds);
            capture later with /capture endpoint. automatic_async — order may remain in status=processing while awaiting async
            update; final status delivered via webhook.

            '
          example: automatic
        total_amount:
          type: string
          description: 'Total amount to be paid as a decimal string. Must equal the sum of all payment transaction amounts.
            Example: "100.00".

            '
          example: '100.00'
        external_reference:
          type: string
          description: Your internal order reference ID. Returned in all order responses.
          example: ORDER-2024-001234
        description:
          type: string
          description: Description of the purchased product or service.
          example: Premium subscription
        payer:
          $ref: '#/components/schemas/OrderPayer'
        transactions:
          $ref: '#/components/schemas/OrderTransactions'
        config:
          $ref: '#/components/schemas/OrderConfig'
        items:
          type: array
          description: Items included in the order.
          items:
            $ref: '#/components/schemas/OrderItem'
        shipment:
          $ref: '#/components/schemas/OrderShipment'
        additional_info:
          type: object
          description: Additional information required for specific payment methods (e.g. PSE).
          properties:
            payer:
              type: object
              properties:
                ip_address:
                  type: string
                  description: IP address of the payer. Required for PSE payments.
                  example: 200.100.50.25
        integration_data:
          type: object
          description: Integration metadata used by MercadoPago internally.
          properties:
            platform_id:
              type: string
            sponsor_id:
              type: integer
    OrderTransactions:
      type: object
      description: Payment transactions for this order. Currently supports one transaction.
      properties:
        payments:
          type: array
          description: 'Payment transaction(s). Required when processing_mode=automatic. Must not be present when processing_mode=manual
            (add via POST /orders/{id}/transactions).

            '
          items:
            $ref: '#/components/schemas/OrderPayment'
    OrderPayment:
      type: object
      required:
      - amount
      - payment_method
      properties:
        amount:
          type: string
          description: Transaction amount as a decimal string.
          example: '100.00'
        payment_method:
          $ref: '#/components/schemas/OrderPaymentMethod'
        expiration_time:
          type: string
          description: 'Transaction expiration in ISO 8601 duration format (e.g. "P1D" = 1 day, "PT20M" = 20 minutes). Applies
            to ticket and bank transfer payment methods.

            '
          example: P1D
        date_of_expiration:
          type: string
          format: date-time
          description: Absolute expiration date-time. Takes precedence over expiration_time if both provided.
    OrderPaymentMethod:
      type: object
      required:
      - id
      - type
      description: 'Payment method for the transaction. Use GET /v1/payment_methods to list available methods for your site.

        '
      properties:
        id:
          type: string
          description: 'Payment method identifier. Examples by type: Cards: visa, master, elo, hipercard, amex. Ticket/cash:
            bolbradesco (Boleto), oxxo, rapipago, pagofacil. Bank transfer: pix, clabe (SPEI), pse.

            '
          example: visa
        type:
          type: string
          enum:
          - credit_card
          - debit_card
          - bank_transfer
          - ticket
          - digital_wallet
          - account_money
          example: credit_card
        token:
          type: string
          description: Card token. Required for credit_card and debit_card types.
          example: 1c87b6b301010101ddcd92f9bbbb3be2
        installments:
          type: integer
          description: Number of installments. Use 1 for no installments.
          minimum: 1
          example: 1
        statement_descriptor:
          type: string
          description: Text shown on payer's card statement. Maximum 50 characters.
          maxLength: 50
        financial_institution:
          type: string
          description: Bank code. Required for PSE (Colombia) bank transfer payments.
          example: '1051'
    OrderPayer:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          example: customer@example.com
        first_name:
          type: string
        last_name:
          type: string
        identification:
          type: object
          properties:
            type:
              type: string
              description: Document type (e.g. CPF, CNPJ, DNI, NIT, RFC)
              example: CPF
            number:
              type: string
              description: Document number (digits only, no formatting)
              example: '99999999999'
        phone:
          type: object
          properties:
            area_code:
              type: string
              example: '11'
            number:
              type: string
              example: '43434343'
        address:
          type: object
          properties:
            zip_code:
              type: string
            street_name:
              type: string
            street_number:
              type: string
            neighborhood:
              type: string
            city:
              type: string
            state:
              type: string
            complement:
              type: string
        entity_type:
          type: string
          enum:
          - individual
          - association
          description: Payer entity type. Required for PSE (Colombia) payments.
    OrderConfig:
      type: object
      description: Optional settings for the order.
      properties:
        online:
          type: object
          description: Settings for online card transactions.
          properties:
            transaction_security:
              type: object
              description: '3DS (3D Secure) configuration. After creating the order, the response indicates if a challenge
                is required via transactions.payments[].payment_method.transaction_security.

                '
              properties:
                validation:
                  type: string
                  enum:
                  - supported
                  - required
                  - never
                  description: 'supported — run 3DS when supported by issuer; required — always run 3DS, reject if not supported;
                    never — skip 3DS entirely.

                    '
                liability_shift:
                  type: string
                  enum:
                  - required
                  - not_required
                  description: 'Required when validation is not "never". required — only approve if liability shifts to issuer;
                    not_required — approve regardless of liability shift outcome.

                    '
            callback_url:
              type: string
              format: uri
              description: Redirect URL after PSE bank authentication completes.
              example: https://merchant.com/pse/return
    OrderItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_price:
          type: number
          format: float
        category_id:
          type: string
    OrderShipment:
      type: object
      properties:
        address:
          type: object
          properties:
            zip_code:
              type: string
            street_name:
              type: string
            street_number:
              type: string
            neighborhood:
              type: string
            city:
              type: string
            state:
              type: string
            complement:
              type: string
    Order:
      type: object
      description: A MercadoPago Order.
      properties:
        id:
          type: string
          description: Order unique identifier, automatically generated by MercadoPago.
          example: 01JG28GRB9NYTG6VVS3R5N58YT
        type:
          type: string
          example: online
        processing_mode:
          type: string
          enum:
          - automatic
          - manual
        capture_mode:
          type: string
          enum:
          - automatic
          - manual
          - automatic_async
        status:
          type: string
          enum:
          - created
          - processed
          - action_required
          - processing
          - canceled
          description: 'created — order created, waiting for processing. processed — all transactions successfully processed.
            action_required — integrator action needed (e.g. capture an authorized payment). processing — being processed;
            no action needed from integrator. canceled — order canceled, will not be processed further.

            '
          example: processed
        status_detail:
          type: string
          enum:
          - created
          - accredited
          - in_process
          - in_review
          - waiting_payment
          - waiting_capture
          - waiting_transfer
          description: 'accredited — payment credited; waiting_payment — waiting for payer to complete offline payment; waiting_capture
            — authorized payment awaiting capture; waiting_transfer — waiting for bank transfer.

            '
          example: accredited
        external_reference:
          type: string
        total_amount:
          type: string
          description: Total order amount as decimal string.
          example: '100.00'
        total_paid_amount:
          type: string
          description: Total amount effectively paid so far.
          example: '100.00'
        description:
          type: string
        country_code:
          type: string
          description: site_id of the order (e.g. MLB, MLA).
          example: MLB
        user_id:
          type: integer
          description: Collector (seller) user ID.
        created_date:
          type: string
          format: date-time
        last_updated_date:
          type: string
          format: date-time
        client_token:
          type: string
          description: 'Token for client-side rendering of the payment UI (e.g. Bricks). Only returned when applicable.

            '
        payer:
          $ref: '#/components/schemas/OrderPayer'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        shipment:
          $ref: '#/components/schemas/OrderShipment'
        transactions:
          type: object
          properties:
            payments:
              type: array
              items:
                $ref: '#/components/schemas/OrderTransactionPayment'
        config:
          $ref: '#/components/schemas/OrderConfig'
        integration_data:
          type: object
    OrderTransactionPayment:
      type: object
      properties:
        id:
          type: string
          description: Transaction ID, automatically generated by MercadoPago.
        amount:
          type: string
          description: Transaction amount.
          example: '100.00'
        paid_amount:
          type: string
          description: Amount effectively paid.
        reference_id:
          type: string
          description: External reference for this transaction.
        status:
          type: string
          enum:
          - created
          - processed
          - action_required
          - processing
          description: 'created — transaction created; processed — transaction successfully processed; action_required — integrator
            must act (e.g. capture); processing — awaiting asynchronous result.

            '
        status_detail:
          type: string
          enum:
          - accredited
          - waiting_capture
          - created
          - pending_review_manual
          - in_process
        date_of_expiration:
          type: string
          format: date-time
        expiration_time:
          type: string
          description: Expiration duration in ISO 8601 format.
        payment_method:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            token:
              type: string
            installments:
              type: integer
            statement_descriptor:
              type: string
            ticket_url:
              type: string
              format: uri
              description: URL to view or print the ticket (Boleto, OXXO, etc.).
            barcode_content:
              type: string
              description: Barcode string for offline payment methods.
            reference:
              type: string
              description: Reference number for offline payment methods.
            verification_code:
              type: string
            financial_institution:
              type: string
            redirect_url:
              type: string
              format: uri
              description: 'Redirect URL for PSE bank transfer (Colombia). In production, redirect the payer to this URL to
                complete authentication at their bank.

                '
            digitable_line:
              type: string
              description: Digitable line for Boleto payments.
            qr_code:
              type: string
              description: QR code string for Pix payments.
            qr_code_base64:
              type: string
              description: QR code image as Base64 for Pix payments.
            e2e_id:
              type: string
              description: End-to-end identifier for Pix transactions (mandatory tracking code).
            transaction_security:
              type: object
              description: 3DS challenge result.
              properties:
                status:
                  type: string
                  enum:
                  - pending
                  - success
                  - failed
                redirect_url:
                  type: string
                  format: uri
                  description: URL to redirect payer to complete 3DS challenge (when status=pending).
    OrderRefundRequest:
      type: object
      description: 'Refund request for an order. Omit transactions for a full refund. Include specific transaction amounts
        for partial refunds.

        '
      properties:
        transactions:
          type: array
          description: Transactions to refund. Omit for full order refund.
          items:
            type: object
            properties:
              id:
                type: string
                description: Transaction ID to refund.
              amount:
                type: string
                description: Amount to refund. Omit for full transaction refund.
    OrderSearchResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        paging:
          type: object
          properties:
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
    UpdateCardRequest:
      type: object
      description: Request body to update a saved card's expiry or cardholder data.
      properties:
        expiration_month:
          type: integer
          minimum: 1
          maximum: 12
        expiration_year:
          type: integer
        cardholder:
          type: object
          properties:
            name:
              type: string
              description: Name as it appears on the card.
            identification:
              $ref: '#/components/schemas/Identification'
    PaymentUpdateRequest:
      type: object
      description: Request body to update a payment (capture, cancel, or extend expiration).
      properties:
        capture:
          type: boolean
          description: Set true to capture an authorized payment.
        status:
          type: string
          enum:
          - cancelled
          description: Set to cancelled to cancel an authorized payment.
        transaction_amount:
          type: number
          format: float
          description: Partial capture amount (must be ≤ original authorized amount).
        date_of_expiration:
          type: string
          format: date-time
          description: New expiration date for cash payment methods.
    SubscriptionUpdateRequest:
      type: object
      description: Request body to update a subscription.
      properties:
        reason:
          type: string
        external_reference:
          type: string
        back_url:
          type: string
          format: uri
        auto_recurring:
          $ref: '#/components/schemas/AutoRecurring'
        card_token_id:
          type: string
          description: New card token to update the payment method.
        card_token_id_secondary:
          type: string
          description: Token for secondary/fallback payment method card.
        payment_method_id_secondary:
          type: string
          description: Secondary payment method identifier for fallback charges.
        status:
          type: string
          enum:
          - pending
          - authorized
          - paused
          - cancelled
    AuthorizedPaymentSearchResult:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Pagination'
        results:
          type: array
          items:
            $ref: '#/components/schemas/AuthorizedPayment'
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token. Send in Authorization header only — never as a URL query parameter.
    publicKey:
      type: apiKey
      in: header
      name: X-Public-Key
      description: 'Public key for client-side card tokenization via MercadoPago.js / MP Secure Fields only.

        Safe to embed in frontend code. Must never be used for server-to-server API calls.'
      x-mp-pci-scope: false
    mercadopagoOAuth:
      type: oauth2
      description: 'OAuth 2.0 flows for marketplace on-behalf-of and Wallet Connect integrations.

        Use PKCE for mobile/SPA authorization_code flows. The state parameter is

        mandatory to prevent CSRF attacks.'
      flows:
        authorizationCode:
          authorizationUrl: https://auth.mercadopago.com/authorization
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access to account data
            write: Write access (create payments, orders)
            offline_access: Issue refresh tokens for long-lived access
        clientCredentials:
          tokenUrl: https://api.mercadopago.com/oauth/token
          scopes:
            read: Read access
            write: Write access
