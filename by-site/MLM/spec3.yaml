paths:
  /v1/payments:
    post:
      operationId: createPayment
      summary: Create a payment
      description: 'Creates a payment. For card payments, generate a card token client-side via MercadoPago.js before calling
        this endpoint. For cash/offline methods (Boleto, OXXO, Pix), the response includes a payment URL in `transaction_details.external_resource_url`.

        **Idempotency**: Include `X-Idempotency-Key` to safely retry on network errors without risk of double charges.

        **Recommendation**: For new integrations, prefer the Orders API (`POST /v1/orders`).

        **Idempotent:** Supports `X-Idempotency-Key` header to safely retry without duplicate charges.

        **Webhook events triggered:** payment, merchant_order'
      tags:
      - Payments
      security:
      - bearerAuth: []
      parameters:
      - name: X-Idempotency-Key
        in: header
        required: false
        schema:
          type: string
          format: uuid
        description: Unique key per payment attempt. If you retry with the same key and the original payment was processed,
          MP returns the original result without creating a duplicate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
            examples:
              card_brazil:
                summary: Credit card — Brazil (Visa)
                value:
                  transaction_amount: 100.5
                  token: YOUR_ACCESS_TOKEN
                  description: Premium subscription — 1 month
                  installments: 1
                  payment_method_id: visa
                  payer:
                    email: test@example.com
                    identification:
                      type: CPF
                      number: '12345678909'
              pix_brazil:
                summary: Pix — Brazil
                value:
                  transaction_amount: 100.5
                  payment_method_id: pix
                  payer:
                    email: test@example.com
                    identification:
                      type: CPF
                      number: '12345678909'
              boleto_brazil:
                summary: Boleto Bancário — Brazil
                value:
                  transaction_amount: 100.5
                  payment_method_id: bolbradesco
                  payer:
                    email: test@example.com
                    first_name: João
                    last_name: Silva
                    identification:
                      type: CPF
                      number: '12345678909'
              card_argentina:
                summary: Credit card — Argentina (Visa)
                value:
                  transaction_amount: 5000.0
                  token: YOUR_ACCESS_TOKEN
                  description: 'Order #1234'
                  installments: 3
                  payment_method_id: visa
                  payer:
                    email: test@example.com
                    identification:
                      type: DNI
                      number: '12345678'
              oxxo_mexico:
                summary: OXXO — Mexico
                value:
                  transaction_amount: 500.0
                  payment_method_id: oxxo
                  date_of_expiration: '2024-12-31T23:59:59.000-06:00'
                  payer:
                    email: test@example.com
      responses:
        '201':
          description: Payment created
          content: &id002
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '200':
          description: Payment created
          content: *id002
  /v1/payments/{id}:
    get:
      operationId: getPayment
      summary: Get payment by ID
      tags:
      - Payments
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Payment ID
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
    put:
      operationId: updatePayment
      summary: Update or capture a payment
      description: 'Update payment fields or capture an authorized payment. To capture an authorized two-step payment: send
        `{"capture": true}`. To cancel an authorized payment: send `{"status": "cancelled"}`.'
      tags:
      - Payments
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentUpdateRequest'
      responses:
        '200':
          description: Payment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/payments/search:
    get:
      operationId: searchPayments
      summary: Search payments
      tags:
      - Payments
      security:
      - bearerAuth: []
      parameters:
      - name: sort
        in: query
        required: true
        schema:
          type: string
      - name: criteria
        in: query
        required: true
        schema:
          type: string
          enum:
          - asc
          - desc
      - name: external_reference
        in: query
        schema:
          type: string
      - name: range
        in: query
        schema:
          type: string
          enum:
          - date_created
          - date_last_updated
          - money_release_date
      - name: begin_date
        in: query
        schema:
          type: string
          format: date-time
      - name: end_date
        in: query
        schema:
          type: string
          format: date-time
      - name: status
        in: query
        schema:
          type: string
      - name: store_id
        in: query
        schema:
          type: string
      - name: pos_id
        in: query
        schema:
          type: string
      - name: collector.id
        in: query
        schema:
          type: string
      - name: payer.id
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentSearchResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/payments/{id}/refunds:
    post:
      operationId: createRefund
      summary: Create a refund
      description: 'Creates a full or partial refund for an approved payment. Omit the `amount` field for a full refund. Partial
        refunds are supported; multiple partials are allowed up to the original transaction amount.

        **Idempotent:** Supports `X-Idempotency-Key` header to safely retry without duplicate charges.'
      tags:
      - Cancellations & Refunds
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Payment ID to refund
      - name: X-Idempotency-Key
        in: header
        required: false
        schema:
          type: string
          format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
            examples:
              full_refund:
                summary: Full refund (omit amount)
                value: {}
              partial_refund:
                summary: Partial refund of R$50
                value:
                  amount: 50.0
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  payment_id:
                    type: integer
                  amount:
                    type: number
                    format: float
                  metadata:
                    type: object
                    additionalProperties: true
                  source:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      type:
                        type: string
                  date_created:
                    type: string
                    format: date-time
                  unique_sequence_number:
                    type: string
                  refund_mode:
                    type: string
                    enum:
                    - standard
                    - instant
                  adjustment_amount:
                    type: number
                    format: float
                    nullable: true
                  status:
                    type: string
                    enum:
                    - approved
                    - in_process
                    - rejected
                  reason:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
                  partition_details:
                    type: array
                    items:
                      type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      operationId: listRefunds
      summary: List refunds for a payment
      tags:
      - Cancellations & Refunds
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Refund list
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  payment_id:
                    type: integer
                  amount:
                    type: number
                    format: float
                  metadata:
                    type: object
                    additionalProperties: true
                  source:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      type:
                        type: string
                  date_created:
                    type: string
                    format: date-time
                  unique_sequence_number:
                    type: string
                  refund_mode:
                    type: string
                    enum:
                    - standard
                    - instant
                  adjustment_amount:
                    type: number
                    format: float
                    nullable: true
                  status:
                    type: string
                    enum:
                    - approved
                    - in_process
                    - rejected
                  reason:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
                  partition_details:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/payments/{id}/refunds/{refund_id}:
    get:
      operationId: getRefund
      summary: Get a specific refund
      tags:
      - Cancellations & Refunds
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: refund_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Refund found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  payment_id:
                    type: integer
                  amount:
                    type: number
                    format: float
                  metadata:
                    type: object
                    additionalProperties: true
                  source:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      type:
                        type: string
                  date_created:
                    type: string
                    format: date-time
                  unique_sequence_number:
                    type: string
                  refund_mode:
                    type: string
                    enum:
                    - standard
                    - instant
                  adjustment_amount:
                    type: number
                    format: float
                    nullable: true
                  status:
                    type: string
                    enum:
                    - approved
                    - in_process
                    - rejected
                  reason:
                    type: string
                    nullable: true
                  label:
                    type: string
                    nullable: true
                  partition_details:
                    type: array
                    items:
                      type: object
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/orders:
    post:
      operationId: createOrder
      summary: Create an order
      description: 'Creates an Order for processing payment transactions. Supports automatic (single-stage, set processing_mode=automatic)
        and manual (multi-stage, set processing_mode=manual) modes.


        In automatic mode, include the transactions.payments array with the payment method. In manual mode, omit transactions
        and add them later via POST /v1/orders/{id}/transactions, then trigger processing with POST /v1/orders/{id}/process.


        Available for: credit card, debit card, Pix (MLB), Boleto (MLB), OXXO (MLM), SPEI (MLM), PSE (MCO), Rapipago (MLA),
        Pago Fácil (MLA).'
      tags:
      - Orders
      parameters:
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
        description: Unique key per order creation attempt. Prevents duplicate orders on retry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
            examples:
              credit_card:
                summary: Credit card — all countries
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '100.00'
                      payment_method:
                        id: visa
                        type: credit_card
                        token: 1c87b6b301010101ddcd92f9bbbb3be2
                        installments: 1
              pix:
                summary: Pix — Brazil (MLB)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '100.00'
                      expiration_time: P1D
                      payment_method:
                        id: pix
                        type: bank_transfer
              boleto:
                summary: Boleto Bancário — Brazil (MLB)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                    first_name: João
                    last_name: Silva
                    identification:
                      type: CPF
                      number: '99999999999'
                    address:
                      zip_code: '11034430'
                      street_name: Av. Paulista
                      street_number: '100'
                      city: SAO PAULO
                      state: SP
                  transactions:
                    payments:
                    - amount: '100.00'
                      expiration_time: P1D
                      payment_method:
                        id: bolbradesco
                        type: ticket
              oxxo:
                summary: OXXO — Mexico (MLM)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '500.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '500.00'
                      expiration_time: P3D
                      payment_method:
                        id: oxxo
                        type: ticket
              spei:
                summary: SPEI — Mexico (MLM)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '1000.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                  transactions:
                    payments:
                    - amount: '1000.00'
                      expiration_time: P1D
                      payment_method:
                        id: clabe
                        type: bank_transfer
              pse:
                summary: PSE — Colombia (MCO)
                value:
                  type: online
                  processing_mode: automatic
                  total_amount: '100000.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                    entity_type: individual
                    first_name: Juan
                    last_name: Pérez
                    identification:
                      type: NIT
                      number: '76262349'
                  transactions:
                    payments:
                    - amount: '100000.00'
                      expiration_time: PT20M
                      payment_method:
                        id: pse
                        type: bank_transfer
                        financial_institution: '1051'
                  config:
                    online:
                      callback_url: https://merchant.com/pse/return
                  additional_info:
                    payer:
                      ip_address: 200.100.50.25
              rapipago:
                summary: Rapipago — Argentina (MLA)
                value:
                  type: online
                  processing_mode: automatic
                  capture_mode: automatic_async
                  total_amount: '5000.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
                    identification:
                      type: DNI
                      number: '12345678'
                  transactions:
                    payments:
                    - amount: '5000.00'
                      payment_method:
                        id: rapipago
                        type: ticket
              manual_mode:
                summary: Manual processing mode
                value:
                  type: online
                  processing_mode: manual
                  capture_mode: manual
                  total_amount: '100.00'
                  external_reference: ORDER-2024-001234
                  payer:
                    email: customer@example.com
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '423':
          description: Resource locked — a concurrent request is already processing this order
        '500':
          description: Internal server error
    get:
      operationId: searchOrders
      summary: Search orders
      description: Search for orders using date range and optional filters. begin_date and end_date are required.
      tags:
      - Orders
      parameters:
      - name: begin_date
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: Start of date range (ISO 8601)
      - name: end_date
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: End of date range (ISO 8601)
      - name: external_reference
        in: query
        required: false
        schema:
          type: string
      - name: type
        in: query
        required: false
        schema:
          type: string
          enum:
          - online
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - created
          - processed
          - action_required
          - processing
          - canceled
      - name: limit
        in: query
        schema:
          type: integer
          default: 30
          maximum: 100
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/orders/{id}:
    get:
      operationId: getOrder
      summary: Get order by ID
      description: Returns all order information for the given order ID.
      tags:
      - Orders
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Order ID
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/orders/{order_id}/cancel:
    post:
      operationId: cancelOrder
      summary: Cancel an order
      description: Cancels an order and all its transactions. Only orders with status=action_required or status=created can
        be canceled.
      tags:
      - Orders
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
      - name: X-Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Order canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — order cannot be canceled in its current status
  /v1/orders/{order_id}/process:
    post:
      operationId: processOrder
      summary: Process an order
      description: Triggers processing of an order and all its transactions. Only available for manual-mode orders (processing_mode=manual).
