        payer_email:
          type: string
          format: email
          description: Payer's email address
        card_token_id:
          type: string
          description: Card token for credit card subscriptions
        auto_recurring:
          $ref: '#/components/schemas/AutoRecurring'
        back_url:
          type: string
          format: uri
        external_reference:
          type: string
          example: CUSTOMER-ID-12345
        status:
          type: string
          enum:
          - pending
          - authorized
          - paused
          - cancelled
          description: Initial status (default is pending until payer authorizes)
    Subscription:
      type: object
      description: A MercadoPago subscription (preapproval)
      properties:
