              type: integer
            pending_charge_quantity:
              type: integer
            charged_amount:
              type: number
              format: float
            pending_charge_amount:
              type: number
              format: float
        next_payment_date:
          type: string
          format: date-time
        payment_method_id:
          type: string
        card_id:
          type: integer
        init_point:
          type: string
          format: uri
