# Pipeline configuration: Fury Spec Hub → openapi/spec3.yaml
#
# fury_app: exact app name registered in Fury Spec Hub
# tag:      matching tag name in spec3.yaml (groups paths by product)
# product:  product slug — used as subfolder in by-site/{SITE}/{product}/spec3.yaml
# paths:    path prefixes owned by this app (scopes merges in both directions)

apps:
  - fury_app: payments
    tag: Payments
    product: payments
    paths:
      - /v1/payments

  - fury_app: openplatform-customer-go
    tag: Customers
    product: customers
    paths:
      - /v1/customers

  - fury_app: mpcs-preferences-api
    tag: Preferences
    product: preferences
    paths:
      - /checkout/preferences

  - fury_app: chargeback-frontend-wrapper
    tag: Chargebacks
    product: chargebacks
    paths:
      - /v1/chargebacks

  - fury_app: mp-subscriptions
    tag: Subscriptions
    product: subscriptions
    paths:
      - /preapproval
      - /preapproval_plan

  - fury_app: merchant-orders-api
    tag: Merchant Orders
    product: merchant_orders
    paths:
      - /merchant_orders

  - fury_app: platsec-oauth-api
    tag: OAuth
    product: oauth
    paths:
      - /oauth/token

  - fury_app: payment-methods-write-v2
    tag: Payment Methods
    product: payment_methods
    paths:
      - /v1/payment_methods

  - fury_app: stores-api
    tag: Stores
    product: stores
    paths:
      - /users/

  - fury_app: instore-api-pos
    tag: POS
    product: pos
    paths:
      - /pos
