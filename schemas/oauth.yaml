components:
  schemas:
    CurrencyId:
      type: string
      description: ISO 4217 currency code for the applicable site
      enum:
        - ARS
        - BRL
        - MXN
        - CLP
        - COP
        - PEN
        - UYU
        - BOB
        - PYG
        - USD
        - CRC
        - DOP
        - HNL
        - NIO
        - GTQ
        - VES
      example: BRL
