components:
  schemas:
    SubscriptionPlanRequest:
      type: object
      description: Request body to create a subscription plan.
      properties:
        reason:
          type: string
          description: Plan description shown to the payer.
          example: "Monthly Premium Subscription"
        auto_recurring:
          $ref: "#/components/schemas/AutoRecurring"
        payment_methods_allowed:
          type: object
          properties:
            payment_types:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
            payment_methods:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
        back_url:
          type: string
          format: uri
          description: Redirect URL after subscription setup.
        external_reference:
          type: string
          description: Your internal reference for this plan.

    AutoRecurring:
      type: object
      required: [frequency, frequency_type, transaction_amount, currency_id]
      properties:
        frequency:
          type: integer
          description: Billing interval (e.g., 1 for monthly, 7 for weekly).
          example: 1
        frequency_type:
          type: string
          enum: [months, days]
          description: Unit for the billing interval.
          example: months
        transaction_amount:
          type: number
          format: float
          description: Amount to charge each cycle (decimal, not cents).
          example: 29.90
        currency_id:
          $ref: "#/components/schemas/CurrencyId"
        free_trial:
          type: object
          description: Optional free trial period before billing starts.
          properties:
            frequency:
              type: integer
              example: 14
            frequency_type:
              type: string
              enum: [months, days]
              example: days
        repetitions:
          type: integer
          description: Total number of billing cycles (null = indefinite).
          nullable: true

    SubscriptionPlan:
      type: object
      description: A subscription plan (preapproval_plan).
      properties:
        id:
          type: string
          example: "2c9380847e9c5058017ea64ea8260b60"
        application_id:
          type: string
          description: Application that created this plan.
        collector_id:
          type: integer
          description: Seller's user ID.
        reason:
          type: string
        status:
          type: string
          enum: [active, inactive]
        auto_recurring:
          $ref: "#/components/schemas/AutoRecurring"
        payment_methods_allowed:
          type: object
        back_url:
          type: string
          format: uri
        external_reference:
          type: string
        date_created:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        init_point:
          type: string
          format: uri
          description: URL to subscribe users to this plan.

    SubscriptionRequest:
      type: object
      description: Request body to create a subscription.
      properties:
        preapproval_plan_id:
          type: string
          description: Reference a previously created plan (recommended).
        reason:
          type: string
          description: Subscription description shown to payer.
          example: "Monthly Premium — Acme Inc."
        payer_email:
          type: string
          format: email
          description: Payer's email address.
        card_token_id:
          type: string
          description: Card token for credit card subscriptions.
        auto_recurring:
          $ref: "#/components/schemas/AutoRecurring"
        back_url:
          type: string
          format: uri
        external_reference:
          type: string
          example: "CUSTOMER-ID-12345"
        status:
          type: string
          enum: [pending, authorized, paused, cancelled]

    SubscriptionUpdateRequest:
      type: object
      description: Request body to update a subscription.
      properties:
        reason:
          type: string
        external_reference:
          type: string
        back_url:
          type: string
          format: uri
        auto_recurring:
          $ref: "#/components/schemas/AutoRecurring"
        card_token_id:
          type: string
          description: New card token to update the payment method.
        card_token_id_secondary:
          type: string
          description: Token for secondary/fallback payment method card.
        payment_method_id_secondary:
          type: string
          description: Secondary payment method identifier for fallback charges.
        status:
          type: string
          enum: [pending, authorized, paused, cancelled]

    Subscription:
      type: object
      description: A MercadoPago subscription (preapproval).
      properties:
        id:
          type: string
          example: "sub_abcdef1234567890"
        version:
          type: integer
          description: Schema version.
        application_id:
          type: string
          description: Application that created this subscription.
        collector_id:
          type: integer
          description: Seller's user ID.
        payer_id:
          type: integer
        payer_email:
          type: string
          format: email
        preapproval_plan_id:
          type: string
        reason:
          type: string
        external_reference:
          type: string
        back_url:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, authorized, paused, cancelled]
        date_created:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        auto_recurring:
          $ref: "#/components/schemas/AutoRecurring"
        summarized:
          type: object
          properties:
            quotas:
              type: integer
            charged_quantity:
              type: integer
            pending_charge_quantity:
              type: integer
            charged_amount:
              type: number
              format: float
            pending_charge_amount:
              type: number
              format: float
        next_payment_date:
          type: string
          format: date-time
        payment_method_id:
          type: string
        card_id:
          type: integer
        first_invoice_offset:
          type: integer
          description: Days offset for the first invoice relative to subscription creation.
        init_point:
          type: string
          format: uri
          description: Authorization URL — send payer here to confirm subscription.

    AuthorizedPayment:
      type: object
      description: An invoice generated by a subscription billing cycle.
      properties:
        id:
          type: integer
        type:
          type: string
        date_created:
          type: string
          format: date-time
        last_modified:
          type: string
          format: date-time
        preapproval_id:
          type: string
        reason:
          type: string
        external_reference:
          type: string
        currency_id:
          $ref: "#/components/schemas/CurrencyId"
        transaction_amount:
          type: number
          format: float
        debit_date:
          type: string
          format: date-time
          description: Date the charge was debited.
        status:
          type: string
          enum: [scheduled, processed, recycling, cancelled]
        payment:
          type: object
          properties:
            id:
              type: integer
              description: Linked payment ID in /v1/payments.
            status:
              type: string
            status_detail:
              type: string

    SubscriptionSearchResult:
      type: object
      properties:
        paging:
          $ref: "#/components/schemas/Pagination"
        results:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"

    AuthorizedPaymentSearchResult:
      type: object
      properties:
        paging:
          $ref: "#/components/schemas/Pagination"
        results:
          type: array
          items:
            $ref: "#/components/schemas/AuthorizedPayment"
