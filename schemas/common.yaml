components:
  schemas:
    Error:
      type: object
      required:
      - status
      - error
      - message
      properties:
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Error code identifier
          example: bad_request
          x-mp-sites:
          - MLA
          - MLB
          - MLM
          - MLC
          - MCO
          - MPE
          - MLU
        message:
          type: string
          description: Human-readable error message (English)
          example: The access token is invalid
        cause:
          type: array
          items:
            $ref: '#/components/schemas/ErrorCause'
    ErrorCause:
      type: object
      properties:
        code:
          type: integer
          example: 2001
        description:
          type: string
          example: Invalid access token
        data:
          type: string
          nullable: true
    Money:
      type: object
      description: 'Monetary amount. MercadoPago uses decimal amounts (e.g., 100.50 for R$100,50), NOT integer cents. Precision:
        2 decimal places for most currencies; 0 for CLP.'
      properties:
        amount:
          type: number
          format: float
          example: 100.5
        currency_id:
          $ref: '#/components/schemas/CurrencyId'
    CurrencyId:
      type: string
      description: ISO 4217 currency code for the applicable site
      enum:
      - ARS
      - BRL
      - MXN
      - CLP
      - COP
      - PEN
      - UYU
      - BOB
      - PYG
      - USD
      - CRC
      - DOP
      - HNL
      - NIO
      - GTQ
      - VES
      x-mp-sites:
      - MLA
      - MLB
      - MLM
      - MLC
      - MCO
      - MPE
      - MLU
      example: BRL
    Identification:
      type: object
      description: Payer identification document. Valid types vary by country.
      properties:
        type:
          type: string
          description: Identification type (e.g., CPF, CNPJ for Brazil; DNI for Argentina; RFC for Mexico)
          example: CPF
        number:
          type: string
          description: Identification number (no formatting — digits only)
          example: '12345678909'
    Phone:
      type: object
      properties:
        area_code:
          type: string
          example: '11'
        number:
          type: string
          example: '987654321'
    Address:
      type: object
      properties:
        zip_code:
          type: string
          example: 01310-100
        street_name:
          type: string
          example: Av. Paulista
        street_number:
          type: string
          example: '1000'
        city:
          type: string
        state:
          type: string
        country:
          type: string
    Payer:
      type: object
      description: Payment payer information
      properties:
        id:
          type: string
          description: MP payer ID (registered users only)
          example: '123456789'
        email:
          type: string
          format: email
          description: Payer email address
          example: test@example.com
        identification:
          $ref: '#/components/schemas/Identification'
        type:
          type: string
          enum:
          - customer
          - registered
          - guest
          description: Payer type
        first_name:
          type: string
        last_name:
          type: string
        phone:
          $ref: '#/components/schemas/Phone'
        address:
          $ref: '#/components/schemas/Address'
    StoreRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Store display name
          example: Main Branch — Paulista
        external_id:
          type: string
          description: Your internal store identifier
        business_hours:
          type: object
          properties:
            monday:
              type: array
              items:
                type: object
                properties:
                  open:
                    type: string
                    example: 09:00
                  close:
                    type: string
                    example: '18:00'
        location:
          type: object
          properties:
            street_number:
              type: string
            street_name:
              type: string
            city_name:
              type: string
            state_name:
              type: string
            zip_code:
              type: string
            latitude:
              type: number
              format: float
            longitude:
              type: number
              format: float
    Store:
      allOf:
      - $ref: '#/components/schemas/StoreRequest'
      - type: object
        properties:
          id:
            type: string
            description: Store unique identifier
          date_created:
            type: string
            format: date-time
          date_last_updated:
            type: string
            format: date-time
    POSRequest:
      type: object
      required:
      - name
      - store_id
      properties:
        name:
          type: string
          description: POS display name
          example: Caixa 1
        store_id:
          type: string
          description: Parent store ID
        external_id:
          type: string
          description: Your internal POS identifier
        external_store_id:
          type: string
        category:
          type: integer
          description: Business category code
        fixed_amount:
          type: boolean
          description: When true the POS amount is fixed and cannot be changed by payer
          default: false
        url:
          type: string
          format: uri
          description: Webhook URL for this specific POS
    POS:
      allOf:
      - $ref: '#/components/schemas/POSRequest'
      - type: object
        properties:
          id:
            type: string
          qr_code:
            type: string
            description: QR code data string for this POS
          qr_code_image:
            type: string
            format: uri
            description: URL of QR code image
          date_created:
            type: string
            format: date-time
          date_last_updated:
            type: string
            format: date-time
    Pagination:
      type: object
      description: Pagination metadata returned in list/search responses
      properties:
        total:
          type: integer
          description: Total number of results
          example: 42
        limit:
          type: integer
          description: Results per page
          example: 30
        offset:
          type: integer
          description: Offset of the current page
          example: 0
  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 400
            error: bad_request
            message: 'Invalid parameter: transaction_amount must be greater than 0'
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 401
            error: unauthorized
            message: Invalid access token
    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 422
            error: unprocessable_entity
            message: The card token has already been used
    TooManyRequests:
      description: Rate limit exceeded — wait before retrying
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 429
            error: too_many_requests
            message: Rate limit exceeded. Retry after the indicated number of seconds.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'Access token for server-side API calls.

        Use YOUR_ACCESS_TOKEN tokens for sandbox, APP_USR-xxx for production.

        Send in the Authorization header ONLY — never as a URL query parameter

        (?access_token=...) as query strings appear in server logs and proxy caches.'
