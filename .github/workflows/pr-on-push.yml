name: Create PR on Push

on:
  push:
    branches:
      - 'enhancement/automatic-spec-**'

jobs:
  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const baseBranch = 'main';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // If dx-bot-sync-specs already created the PR, just find and update it
            let existingPR = null;
            try {
              const { data: openPRs } = await github.rest.pulls.list({
                owner,
                repo,
                head: branch,
                base: baseBranch,
                state: 'open',
              });
              if (openPRs.length > 0) existingPR = openPRs[0];
            } catch (error) {
              console.warn(`Error checking existing PRs: ${error.message}`);
            }

            if (existingPR) {
              console.log(`PR already exists: #${existingPR.number} (${existingPR.html_url})`);
              core.setOutput('pr_number', existingPR.number);
              core.setOutput('pr_url', existingPR.html_url);
              return;
            }

            // Fallback: create PR if dx-bot-sync-specs didn't (e.g. token issue)
            const { data: commit } = await github.rest.repos.getCommit({
              owner, repo, ref: context.sha,
            });
            const commitMessage = commit.commit.message || '';
            const lines = commitMessage.split('\n');
            const body = lines.length > 2
              ? lines.slice(2).join('\n').trim()
              : lines.slice(1).join('\n').trim() || commitMessage;

            const today = new Date().toISOString().slice(0, 10);
            const branchMatch = branch.match(/automatic-spec-([^\/]+)\/spec3-([^-\/]+)$/);
            const appName   = branchMatch ? branchMatch[1] : branch;
            const shortHash = branchMatch ? branchMatch[2] : 'unknown';
            const prTitle   = `[OpenAPI Sync] ${appName} | ${shortHash}_${today}`;

            const reviewers = ['lpinillacuev', 'lsanchezgarc'];

            let pr;
            try {
              const { data: newPR } = await github.rest.pulls.create({
                owner, repo,
                title: prTitle,
                head: branch,
                base: baseBranch,
                body: body || 'Automatically synced from Fury Spec Hub',
                draft: false,
              });
              pr = newPR;
            } catch (error) {
              if (error.status === 422 && error.message?.includes('already exists')) {
                const { data: allPRs } = await github.rest.pulls.list({
                  owner, repo, head: branch, base: baseBranch, state: 'all',
                });
                if (allPRs.length > 0) {
                  existingPR = allPRs.find(p => p.state === 'open') || allPRs[0];
                  core.setOutput('pr_number', existingPR.number);
                  core.setOutput('pr_url', existingPR.html_url);
                  return;
                }
              }
              throw error;
            }

            console.log(`PR created: #${pr.number} (${pr.html_url})`);

            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr.number,
                labels: ['automated', 'openapi-sync'],
              });
            } catch (e) { console.warn(`Labels failed: ${e.message}`); }

            try {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number: pr.number, reviewers,
              });
              console.log(`Reviewers requested: ${reviewers.join(', ')} — they will be notified by GitHub`);
            } catch (e) { console.warn(`Reviewer failed: ${e.message}`); }

            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_url', pr.html_url);

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pr_number }} \
            --auto \
            --squash \
            --repo mercadopago/openapi
          echo "Auto-merge enabled on PR #${{ steps.create-pr.outputs.pr_number }}"
