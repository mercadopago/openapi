name: Create PR on Push

on:
  push:
    branches:
      - 'enhancement/automatic-spec-**'

jobs:
  create-pr:
    name: Create Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          github-token: ${{ secrets.UPSTREAM_GH_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const baseBranch = 'main';
            // PR targets the upstream repo; branch lives in the fork
            const upstreamOwner = 'mercadopago';
            const forkOwner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: commit } = await github.rest.repos.getCommit({
              owner: forkOwner,
              repo,
              ref: context.sha,
            });

            const commitMessage = commit.commit.message || '';
            const lines = commitMessage.split('\n');
            const body = lines.length > 2
              ? lines.slice(2).join('\n').trim()
              : lines.slice(1).join('\n').trim() || commitMessage;

            // head must be "forkOwner:branch" for cross-fork PRs
            const headRef = `${forkOwner}:${branch}`;

            // Check if PR already exists on the upstream repo
            let existingPR = null;
            try {
              const { data: openPRs } = await github.rest.pulls.list({
                owner: upstreamOwner,
                repo,
                head: headRef,
                base: baseBranch,
                state: 'open',
              });
              if (openPRs.length > 0) existingPR = openPRs[0];
            } catch (error) {
              console.warn(`Error checking existing PRs: ${error.message}`);
            }

            if (existingPR) {
              console.log(`PR already exists: #${existingPR.number}`);
              try {
                await github.rest.pulls.update({
                  owner: upstreamOwner,
                  repo,
                  pull_number: existingPR.number,
                  body: body || existingPR.body,
                });
              } catch (error) {
                console.warn(`Failed to update PR body: ${error.message}`);
              }
              core.setOutput('pr_number', existingPR.number);
              core.setOutput('pr_url', existingPR.html_url);
              return;
            }

            // Branch format: enhancement/automatic-spec-{appName}/spec3-{hash}
            // Title format:  [OpenAPI Sync] {appName} | {hash}_{date}
            const today = new Date().toISOString().slice(0, 10);
            const branchMatch = branch.match(/automatic-spec-([^\/]+)\/spec3-([^-\/]+)$/);
            const appName   = branchMatch ? branchMatch[1] : branch;
            const shortHash = branchMatch ? branchMatch[2] : 'unknown';
            const prTitle   = `[OpenAPI Sync] ${appName} | ${shortHash}_${today}`;

            // Rotating reviewer — deterministic by ISO week number
            const reviewers = [
              'lpinillacuev',
              'lsanchezgarc',
            ];
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const weekNumber = Math.ceil(
              ((now - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7
            );
            const reviewer = reviewers[weekNumber % reviewers.length];
            console.log(`Week ${weekNumber} → reviewer: ${reviewer}`);

            // Create PR on the upstream repo from the fork branch
            let pr;
            try {
              const { data: newPR } = await github.rest.pulls.create({
                owner: upstreamOwner,
                repo,
                title: prTitle,
                head: headRef,
                base: baseBranch,
                body: body || 'Automatically synced from Fury Spec Hub',
                draft: false,
              });
              pr = newPR;
            } catch (error) {
              if (error.status === 422 && error.message?.includes('already exists')) {
                const { data: allPRs } = await github.rest.pulls.list({
                  owner: upstreamOwner,
                  repo,
                  head: headRef,
                  base: baseBranch,
                  state: 'all',
                });
                if (allPRs.length > 0) {
                  existingPR = allPRs.find(p => p.state === 'open') || allPRs[0];
                  core.setOutput('pr_number', existingPR.number);
                  core.setOutput('pr_url', existingPR.html_url);
                  return;
                }
              }
              throw error;
            }

            console.log(`PR created: #${pr.number} (${pr.html_url})`);

            // Labels
            try {
              await github.rest.issues.addLabels({
                owner: upstreamOwner,
                repo,
                issue_number: pr.number,
                labels: ['automated', 'openapi-sync'],
              });
            } catch (e) { console.warn(`Labels failed: ${e.message}`); }

            // Reviewer
            try {
              await github.rest.pulls.requestReviewers({
                owner: upstreamOwner,
                repo,
                pull_number: pr.number,
                reviewers: [reviewer],
              });
            } catch (e) { console.warn(`Reviewer failed: ${e.message}`); }

            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_url', pr.html_url);

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_GH_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pr_number }} \
            --auto \
            --squash \
            --repo mercadopago/openapi
          echo "Auto-merge enabled on PR #${{ steps.create-pr.outputs.pr_number }}"
